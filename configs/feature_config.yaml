# =============================================================================
# Liste des features actives par categorie. feature_engineering/feature_store.py
# lit ce fichier pour assembler la matrice finale -- ajouter/retirer une
# feature du modele se fait ICI, jamais en modifiant le code d'un module.
# =============================================================================

threshold_features:
  enabled: true
  columns:
    - amount_to_service_threshold_ratio
    - is_above_unit_threshold
    - distance_to_threshold
    - daily_cumulative_ratio

behavioral_features:
  enabled: true
  # toutes calculees en expanding window strictement anterieure a la transaction
  columns:
    - amount_to_customer_median_ratio
    - amount_to_customer_habitual_max_ratio
    - zscore_vs_customer_history
    - is_new_beneficiary
    - days_since_last_transaction
    - customer_activity_break_score

velocity_features:
  enabled: true
  windows: ["1h", "24h", "7d"]
  columns:
    - nb_transactions
    - montant_cumule
    - nb_beneficiaires_distincts
    - montant_moyen_par_operation
    - acceleration

network_features_light:
  enabled: true
  columns:
    - ratio_montant_recu_envoye
    - delai_median_reception_reexpedition
    - nb_expediteurs_distincts
    - nb_destinataires_distincts
    - phone_shared_with_n_accounts
    - is_external_gimtel

channel_features:
  enabled: true
  columns:
    - nb_canaux_distincts_utilises_7j
    - has_switched_channel_after_threshold_hit

temporal_features:
  enabled: true
  columns:
    - hour_of_day
    - is_night
    - is_weekend
    - request_response_latency_ms
    - latency_regularity_score

graph_features:
  enabled: true   # bonus, mais tres rentable pour le critere "contournement/reseaux" (20% de la note)
  columns:
    - mule_score
    - pass_through_ratio
    - pass_through_delay
    - fan_in_degree_percentile
    - fan_out_degree_percentile
    - is_in_bounce_chain
    - bounce_chain_length
    - is_in_closed_circuit
    - multi_account_splitting_score

rule_flags:
  enabled: true   # sorties de rules/business_rules.py utilisees comme features, pas comme decision finale
  columns:
    - rule_amount_over_threshold
    - rule_daily_cumulative_over_threshold
    - rule_fractionnement_suspect
    - rule_rafale_1h
    - rule_nouveau_beneficiaire_gros_montant
    - rule_activite_nocturne_hors_norme

target_column: "IS_FRAUD"   # nom exact a confirmer sur le fichier d'entrainement etiquete
transaction_id_column: "TRANSACTION_CODE"
customer_id_column: "SOURCE_CUSTOMER"
timestamp_column: "TRANSACTION_DATE"
